version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: nextjs_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: s3cr3tpass
      MYSQL_DATABASE: bookstore_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: